<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wailand Team — Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700&family=JetBrains+Mono:wght@400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/app.css" />
    <style>
      #viewApp {
        display: none;
        grid-template-columns: 260px 1fr;
        min-height: 100vh;
      }
      #viewLogin {
        min-height: 100vh;
        display: grid;
        place-items: center;
      }
      .navbtn {
        width: 100%;
        text-align: left;
        margin-bottom: 0.35rem;
      }
      .navbtn.active {
        background: rgba(99, 102, 241, 0.2);
        border-color: rgba(99, 102, 241, 0.35);
      }
      #chatPanel {
        display: none;
        flex-direction: column;
        border-left: 1px solid var(--stroke);
        min-height: 100vh;
        background: rgba(7, 10, 18, 0.35);
      }
      .split {
        display: grid;
        grid-template-columns: 1fr 380px;
        flex: 1;
        min-height: 0;
      }
      @media (max-width: 1100px) {
        .split {
          grid-template-columns: 1fr;
        }
        #chatPanel {
          border-left: none;
          border-top: 1px solid var(--stroke);
        }
      }
    </style>
  </head>
  <body>
    <div id="recallBanner" class="recall-banner">
      <span id="recallText"></span>
      <button type="button" class="btn btn-sm btn-primary" id="recallJoin">Join</button>
    </div>

    <div id="viewLogin">
      <div class="auth-card card card-pad glow">
        <div class="brand" style="margin-bottom: 1rem">
          <span class="brand-mark" data-logo-text>W</span>
          <span data-site-name>Wailand Team</span>
        </div>
        <h1 style="margin: 0 0 0.5rem; font-size: 1.35rem">Admin access</h1>
        <p class="muted" style="margin: 0 0 1rem">Sign in to manage the realtime queue.</p>
        <form id="loginForm">
          <label>Email</label>
          <input class="input" name="email" type="email" required autocomplete="username" />
          <div style="margin-top: 0.75rem">
            <label>Password</label>
            <input class="input" name="password" type="password" required autocomplete="current-password" />
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem">Continue</button>
        </form>
      </div>
    </div>

    <div id="viewApp">
      <aside class="side-nav">
        <div class="brand" style="margin-bottom: 1rem">
          <span class="brand-mark" data-logo-text>W</span>
          <span data-site-name>Wailand Team</span>
        </div>
        <div class="muted" style="font-size: 0.8rem; margin-bottom: 0.5rem"><span id="adminName">Admin</span></div>
        <button type="button" class="btn btn-ghost btn-sm navbtn active" data-filter="all">All tickets</button>
        <button type="button" class="btn btn-ghost btn-sm navbtn" data-filter="order">Order tickets</button>
        <button type="button" class="btn btn-ghost btn-sm navbtn" data-filter="support">Support tickets</button>
        <button type="button" class="btn btn-ghost btn-sm navbtn" data-filter="claimed">Claimed</button>
        <button type="button" class="btn btn-ghost btn-sm navbtn" data-filter="closed">Closed</button>
        <button type="button" class="btn btn-ghost btn-sm navbtn" id="logoutBtn" style="margin-top: 1rem">Log out</button>
      </aside>
      <div class="main-panel" style="padding: 0; display: flex; flex-direction: column">
        <div style="padding: 1rem 1.25rem; border-bottom: 1px solid var(--stroke)">
          <h2 style="margin: 0; font-size: 1.1rem">Operations desk</h2>
          <p class="muted" style="margin: 0.35rem 0 0">Select a ticket to open the live thread.</p>
        </div>
        <div class="split">
          <div style="padding: 1rem; overflow: auto">
            <div class="table-wrap">
              <table id="ticketTable">
                <thead>
                  <tr>
                    <th>#</th>
                    <th>Title</th>
                    <th>Type</th>
                    <th>Status</th>
                    <th>Agent</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody></tbody>
              </table>
            </div>
          </div>
          <aside id="chatPanel">
            <div style="padding: 0.85rem 1rem; border-bottom: 1px solid var(--stroke)">
              <div id="openTitle" style="font-weight: 700">Ticket</div>
              <div class="muted" id="openMeta" style="margin-top: 0.25rem; font-size: 0.85rem"></div>
              <div style="display: flex; flex-wrap: wrap; gap: 0.35rem; margin-top: 0.65rem">
                <button type="button" class="btn btn-sm btn-primary" id="toolClaim">Claim</button>
                <button type="button" class="btn btn-sm btn-ghost" id="toolRecall">Recall</button>
                <button type="button" class="btn btn-sm btn-ghost" id="toolPause">Pause</button>
                <button type="button" class="btn btn-sm btn-ghost" id="toolUnpause">Unpause</button>
                <button type="button" class="btn btn-sm btn-ghost" id="toolMute">Mute client</button>
                <button type="button" class="btn btn-sm btn-danger" id="toolClose">Close</button>
              </div>
            </div>
            <div class="typing" id="adminTyping"></div>
            <div class="chat" id="adminChat" style="flex: 1"></div>
            <div class="chat-input">
              <div class="chat-tools">
                <button type="button" class="btn btn-sm btn-ghost" onclick="document.getElementById('adminFile').click()">
                  File
                </button>
                <input type="file" id="adminFile" hidden />
                <button type="button" class="btn btn-sm btn-ghost" id="adminPdf">PDF</button>
                <button type="button" class="btn btn-sm btn-ghost" id="adminInvoice">Invoice</button>
                <button type="button" class="btn btn-sm btn-ghost" id="adminAudio">Audio</button>
              </div>
              <div class="chat-row">
                <textarea class="input" id="adminMsg" rows="2" placeholder="Reply…"></textarea>
                <button type="button" class="btn btn-primary" id="sendAdmin">Send</button>
              </div>
            </div>
          </aside>
        </div>
      </div>
    </div>

    <script src="https://cdn.socket.io/4.8.1/socket.io.min.js" crossorigin="anonymous"></script>
    <script src="/js/core.js"></script>
    <script src="/js/admin.js"></script>
  </body>
</html>
